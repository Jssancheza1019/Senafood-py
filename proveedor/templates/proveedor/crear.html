{% extends 'gestion/dashboard.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'proveedor/css/styles.css' %}">

<div class="detalle-wrapper">
    <div class="detalle-card">

        <img src="{% static 'gestion/img/logo.jpg' %}" alt="Logo" class="detalle-logo">
        <div class="detalle-brand">SenaFOOD</div>
        <div class="detalle-titulo">Nuevo Proveedor</div>

        {% if messages %}
            {% for message in messages %}
                <div style="background-color:#28a745; color:white; border-radius:8px; padding:10px 16px; font-size:0.85rem; display:flex; align-items:center; gap:8px; margin-bottom:16px;">
                    <i class="fas fa-check-circle"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="seccion-titulo"><i class="fas fa-truck"></i> Información del Proveedor</div>

        <form method="POST">
            {% csrf_token %}

            <div class="detalle-field">
                <label>Nombre <span class="text-danger">*</span></label>
                <input type="text" name="nombre" class="field-input" placeholder="Nombre del proveedor" required>
            </div>

            <div class="detalle-field">
                <label>NIT <span class="text-danger">*</span></label>
                <input type="text" name="nit" class="field-input" placeholder="NIT del proveedor" required>
            </div>

            <div style="display:flex; gap:12px;">
                <div class="detalle-field" style="flex:1;">
                    <label>Email</label>
                    <input type="email" name="email" class="field-input" placeholder="correo@ejemplo.com">
                </div>
                <div class="detalle-field" style="flex:1;">
                    <label>Teléfono</label>
                    <input type="text" name="telefono" class="field-input" placeholder="Número de teléfono">
                </div>
            </div>

            <div class="detalle-field">
                <label>Dirección</label>
                <input type="text" name="direccion" class="field-input" placeholder="Dirección del proveedor">
            </div>

            <button type="submit" class="btn-guardar">
                <i class="fas fa-save me-2"></i> Guardar Proveedor
            </button>
        </form>

        <a href="{% url 'lista_proveedores' %}" class="btn-volver">← Volver a la Lista</a>

    </div>
</div>
{% endblock %}
