{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenaFood - Registro</title>
    <link rel="stylesheet" href="{% static 'gestion/css/styles.css' %}">
</head>
<body class="auth-body"> 
    <div class="login-container"> 
        <img src="{% static 'gestion/img/logo.jpg' %}" alt="Logo SenaFood" class="login-logo">
        <div class="brand-text">SENA FOOD</div>
        
        <h2>Crear Cuenta</h2>

        {% if error %}
            <div class="alert alert-danger" style="background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px;">
                {{ error }}
            </div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
    
            <input type="text" 
            name="nombre" 
            placeholder="Nombre" 
            value="{{ nombre|default:'' }}" 
            required
            pattern="[A-Za-z횁챕챠처첬횁횋횒횙횣챰횗\s]+" 
            title="Solo se permiten letras"
            oninput="this.value = this.value.replace(/[0-9]/g, '')">

            <input type="text" 
            name="apellido" 
            placeholder="Apellido" 
            value="{{ apellido|default:'' }}" 
            required
            pattern="[A-Za-z횁챕챠처첬횁횋횒횙횣챰횗\s]+" 
            title="Solo se permiten letras"
            oninput="this.value = this.value.replace(/[0-9]/g, '')">
    
            <div style="text-align: left; margin-bottom: 5px; font-size: 13px; color: #666;">Tipo de Identificaci처n</div>
            <select name="tipo_identificacion" required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px;">
                <option value="CC" {% if tipo_id == 'CC' %}selected{% endif %}>C챕dula de Ciudadan챠a (CC)</option>
                <option value="TI" {% if tipo_id == 'TI' %}selected{% endif %}>Tarjeta de Identidad (TI)</option>
                <option value="CE" {% if tipo_id == 'CE' %}selected{% endif %}>C챕dula de Extranjer챠a (CE)</option>
            </select>
    
            <input type="text" 
                name="numero_identificacion" 
                placeholder="N첬mero de identificaci처n" 
                value="{{ numero_identificacion|default:'' }}" 
                required
                pattern="\d+"
                title="Ingrese solo n첬meros"
                oninput="this.value = this.value.replace(/[^0-9]/g, '')">    

            <input type="text" 
                name="telefono" 
                placeholder="N첬mero de tel챕fono" 
                value="{{ telefono|default:'' }}" 
                required
                pattern="\d+"
                title="Ingrese solo n첬meros"
                oninput="this.value = this.value.replace(/[^0-9]/g, '')">

            <input type="email" name="email" placeholder="Correo electr처nico" value="{{ email|default:'' }}" required>
            <input type="password" name="password" placeholder="Contrase챰a segura" required>
    
            <button type="submit">REGISTRARME</button>
        </form>
        
        <div class="footer">
            쩔Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesi처n</a>
        </div>
    </div>
</body>
</html>
