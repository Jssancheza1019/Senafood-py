
{% load static %}

{% block content %}
<style>
    .card-editar {
        background: white;
        padding: 2rem;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        max-width: 600px;
        margin: 2rem auto;
    }
    .btn-sena {
        background-color: #39A900;
        color: white;
        border: none;
        font-weight: bold;
    }
    .btn-sena:hover {
        background-color: #2d8500;
        color: white;
    }
    .title-sena {
        color: #39A900;
        border-bottom: 2px solid #39A900;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }
</style>

<div class="container">
    <div class="card-editar">
        <h2 class="text-center title-sena">
            <i class="fas fa-user-edit"></i> Editar Usuario
        </h2>

        <form method="POST" class="row g-3">
            {% csrf_token %}

            <div class="col-md-6">
                <label class="form-label">Nombre</label>
                <input type="text" name="nombre" class="form-control" value="{{ usuario.nombre }}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Apellido</label>
                <input type="text" name="apellido" class="form-control" value="{{ usuario.apellido }}" required>
            </div>

            <div class="col-md-12">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" name="email" class="form-control" value="{{ usuario.email }}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Número de Identificación</label>
                <input type="text" name="numero_identificacion" class="form-control" value="{{ usuario.numero_identificacion }}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Teléfono</label>
                <input type="text" name="telefono" class="form-control" value="{{ usuario.telefono }}">
            </div>

            <div class="col-md-6">
                <label class="form-label">Rol del Usuario</label>
                <select name="rol" class="form-select" required>
                    {% for r in roles %}
                        <option value="{{ r.id_rol }}" {% if r.id_rol == usuario.rol.id_rol %}selected{% endif %}>
                            {{ r.nombre_rol }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12 d-flex justify-content-between mt-4">
                <a href="{% url 'usuarios_lista' %}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Cancelar
                </a>
                <button type="submit" class="btn btn-sena">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
