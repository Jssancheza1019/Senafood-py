{% load static %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

    body {
        font-family: 'Poppins', sans-serif;
        background-color: #f0f7f0;
    }

    .wrapper-editar {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .card-editar {
        background: white;
        padding: 2.5rem 2rem;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
        max-width: 480px;
        width: 100%;
        border-top: 5px solid #28a745;
    }

    .card-logo {
        text-align: center;
        margin-bottom: 0.3rem;
    }

    .card-logo img {
        width: 90px;
        height: 90px;
        object-fit: contain;
    }

    .card-brand {
        text-align: center;
        color: #d4820a;
        font-weight: 700;
        font-size: 1.1rem;
        margin-bottom: 0.5rem;
    }

    .alerta-exito {
        background-color: #f0fff4;
        border: 1px solid #28a745;
        border-left: 4px solid #28a745;
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 0.85rem;
        color: #1a5c2a;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .alerta-error {
        background-color: #fff5f5;
        border: 1px solid #dc3545;
        border-left: 4px solid #dc3545;
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 0.85rem;
        color: #7b1d1d;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .card-title {
        text-align: center;
        font-weight: 700;
        font-size: 1.25rem;
        color: #1a1a1a;
        margin-bottom: 1.5rem;
    }

    .form-label {
        font-weight: 600;
        font-size: 0.85rem;
        color: #1a1a1a;
        margin-bottom: 4px;
    }



    .form-control,
    .form-select {
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        font-size: 0.9rem;
        padding: 10px 14px;
        color: #333;
        background-color: #fff;
        transition: border-color 0.2s;
    }

    .form-control:focus,
    .form-select:focus {
        border-color: #28a745;
        box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.12);
        outline: none;
    }

    .form-hint {
        font-size: 0.75rem;
        color: #888;
        margin-top: 3px;
    }

    .input-id-group {
        display: flex;
        gap: 8px;
    }

    .input-id-group .tipo {
        width: 80px;
        flex-shrink: 0;
    }

    .btn-guardar {
        background-color: #1a3a1a;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 1px;
        width: 100%;
        text-transform: uppercase;
        transition: background 0.2s;
        margin-top: 0.5rem;
    }

    .btn-guardar:hover {
        background-color: #28a745;
    }

    .btn-cancelar {
        display: block;
        text-align: center;
        margin-top: 0.8rem;
        font-size: 0.85rem;
        color: #28a745;
        text-decoration: none;
        font-weight: 500;
    }

    .btn-cancelar:hover {
        text-decoration: underline;
        color: #218838;
    }
</style>

<div class="wrapper-editar">
    <div class="card-editar">

        <!-- Logo -->
        <div class="card-logo">
            <img src="{% static 'gestion/img/logo.jpg' %}" alt="Logo SenaFOOD">
        </div>

        <!-- Marca -->
        <div class="card-brand">SenaFOOD</div>

        <!-- Título -->
        <div class="card-title">Editar Usuario</div>

        {% if messages %}
        {% for message in messages %}
        {% if message.tags == 'success' %}
        <div class="alerta-exito">
            <i class="fas fa-check-circle"></i> {{ message }}
        </div>
        {% else %}
        <div class="alerta-error">
            <i class="fas fa-exclamation-triangle"></i> {{ message }}
        </div>
        {% endif %}
        {% endfor %}
        {% endif %}

        <form method="POST" class="d-flex flex-column gap-3">
            {% csrf_token %}

            <!-- Nombre -->
            <div>
                <label class="form-label">Nombre:</label>
                <input type="text" name="nombre" class="form-control" value="{{ usuario.nombre }}" required>
            </div>

            <!-- Apellido -->
            <div>
                <label class="form-label">Apellido:</label>
                <input type="text" name="apellido" class="form-control" value="{{ usuario.apellido }}" required>
            </div>

            <!-- Email -->
            <div>
                <label class="form-label">Correo Electrónico:</label>
                <input type="email" name="email" class="form-control" value="{{ usuario.email }}" required>
            </div>

            <!-- Teléfono -->
            <div>
                <label class="form-label">Teléfono:</label>
                <input type="text" name="telefono" class="form-control" value="{{ usuario.telefono }}">
            </div>

            <!-- Identificación -->
            <div>
                <label class="form-label">Identificación:</label>
                <div class="input-id-group">
                    <input type="text" class="form-control tipo" value="{{ usuario.tipo_identificacion }}" readonly>
                    <input type="text" name="numero_identificacion" class="form-control"
                        value="{{ usuario.numero_identificacion }}" required>
                </div>
            </div>

            <!-- Rol -->
            <div>
                <label class="form-label">Rol del Usuario:</label>
                <select name="rol" class="form-select" required>
                    {% for r in roles %}
                    <option value="{{ r.id_rol }}" {% if r.id_rol == usuario.rol.id_rol %}selected{% endif %}>
                        {{ r.nombre_rol }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Botones -->
            <button type="submit" class="btn-guardar">
                <i class="fas fa-save"></i> Guardar Cambios
            </button>

            <a href="{% url 'usuarios_lista' %}" class="btn-cancelar">
                ← Volver a la Lista
            </a>

        </form>
    </div>
</div>

{% endblock %}
